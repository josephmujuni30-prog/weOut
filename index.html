<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- FIX: Updated title from generic to app name -->
    <title>weOut – Discover Events in Nairobi</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Suppress benign Vite WebSocket connection errors in AI Studio iframe environment
      window.addEventListener('unhandledrejection', (event) => {
        if (
          event.reason &&
          ((event.reason.message && event.reason.message.includes('WebSocket')) ||
            (typeof event.reason === 'string' && event.reason.includes('WebSocket')))
        ) {
          event.preventDefault();
        }
      });
      window.addEventListener(
        'error',
        (event) => {
          if (event.message && event.message.includes('WebSocket')) {
            event.preventDefault();
          }
        },
        true
      );
    </script>
  </body>
</html>
